<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ key }} - R2 Drive</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --md-bg: #ffffff;
            --md-text: #1e293b;
            --md-code-bg: #f1f5f9;
            --md-code-text: #e11d48;
            --md-border: #e2e8f0;
            --md-link: #3b82f6;
            --md-blockquote-bg: #f8fafc;
            --md-blockquote-border: #3b82f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --md-bg: #0f172a;
                --md-text: #e2e8f0;
                --md-code-bg: #1e293b;
                --md-code-text: #f472b6;
                --md-border: #334155;
                --md-link: #60a5fa;
                --md-blockquote-bg: #1e293b;
                --md-blockquote-border: #60a5fa;
            }
        }

        .markdown-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .markdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--md-border);
        }

        .markdown-header h1 {
            font-size: 18px;
            margin: 0;
            word-break: break-all;
            color: var(--md-text);
        }

        .markdown-body {
            background: var(--md-bg);
            color: var(--md-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.8;
        }

        /* 标题 */
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.3;
        }

        .markdown-body h1 {
            font-size: 2em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--md-border);
        }

        .markdown-body h2 {
            font-size: 1.5em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--md-border);
        }

        .markdown-body h3 {
            font-size: 1.25em;
        }

        .markdown-body h4 {
            font-size: 1em;
        }

        /* 段落 */
        .markdown-body p {
            margin-top: 0;
            margin-bottom: 1em;
        }

        /* 链接 */
        .markdown-body a {
            color: var(--md-link);
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        /* 代码 */
        .markdown-body code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: var(--md-code-bg);
            border-radius: 6px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            color: var(--md-code-text);
        }

        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: var(--md-code-bg);
            border-radius: 8px;
            margin-bottom: 1em;
        }

        .markdown-body pre code {
            display: block;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
            color: var(--md-text);
        }

        /* 引用 */
        .markdown-body blockquote {
            padding: 0 1em;
            color: var(--md-text);
            border-left: 4px solid var(--md-blockquote-border);
            background-color: var(--md-blockquote-bg);
            margin: 0 0 1em 0;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body blockquote > :first-child {
            margin-top: 0;
        }

        .markdown-body blockquote > :last-child {
            margin-bottom: 0;
        }

        /* 列表 */
        .markdown-body ul,
        .markdown-body ol {
            padding-left: 2em;
            margin-bottom: 1em;
        }

        .markdown-body li {
            margin-bottom: 0.25em;
        }

        .markdown-body li + li {
            margin-top: 0.25em;
        }

        .markdown-body li > p {
            margin-top: 1em;
        }

        /* 表格 */
        .markdown-body table {
            display: block;
            width: max-content;
            max-width: 100%;
            overflow: auto;
            margin-bottom: 1em;
            border-spacing: 0;
            border-collapse: collapse;
        }

        .markdown-body table th,
        .markdown-body table td {
            padding: 8px 16px;
            border: 1px solid var(--md-border);
        }

        .markdown-body table th {
            font-weight: 600;
            background-color: var(--md-code-bg);
        }

        .markdown-body table tr:nth-child(2n) {
            background-color: var(--md-code-bg);
        }

        /* 分割线 */
        .markdown-body hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: var(--md-border);
            border: 0;
            border-radius: 4px;
        }

        /* 图片 */
        .markdown-body img {
            max-width: 100%;
            box-sizing: border-box;
            border-radius: 8px;
        }

        /* 任务列表 */
        .markdown-body .task-list-item {
            list-style-type: none;
        }

        .markdown-body .task-list-item input {
            margin: 0 0.2em 0.25em -1.6em;
            vertical-align: middle;
        }

        /* 目录 */
        .markdown-body .toc {
            background: var(--md-code-bg);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 1.5em;
        }

        .markdown-body .toc ul {
            margin-bottom: 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .markdown-container {
                padding: 20px 15px;
            }

            .markdown-body {
                font-size: 15px;
            }

            .markdown-body pre {
                padding: 12px;
                font-size: 13px;
            }

            .markdown-body table th,
            .markdown-body table td {
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="markdown-container">
        <div class="markdown-header">
            <h1>📝 {{ key }}</h1>
            <div>
                <button class="btn" onclick="toggleRaw()" id="toggleBtn">查看源码</button>
                <a href="/api/download/{{ key }}" class="btn">⬇️ 下载</a>
                <a href="/" class="btn btn-secondary">返回</a>
            </div>
        </div>
        
        <div id="renderedContent" class="markdown-body">
            {{ content | safe }}
        </div>
        
        <pre id="rawContent" style="display: none; background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; overflow-x: auto; font-family: 'Monaco', 'Menlo', monospace; font-size: 14px; line-height: 1.6; white-space: pre-wrap;">{{ content | striptags }}</pre>
    </div>

    <script>
        let showRaw = false;
        
        function toggleRaw() {
            showRaw = !showRaw;
            const rendered = document.getElementById('renderedContent');
            const raw = document.getElementById('rawContent');
            const btn = document.getElementById('toggleBtn');
            
            if (showRaw) {
                rendered.style.display = 'none';
                raw.style.display = 'block';
                btn.textContent = '查看渲染';
            } else {
                rendered.style.display = 'block';
                raw.style.display = 'none';
                btn.textContent = '查看源码';
            }
        }

        // 复制代码块
        document.querySelectorAll('pre code').forEach(block => {
            block.style.cursor = 'pointer';
            block.title = '点击复制';
            block.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(block.textContent);
                    showToast('代码已复制', 'success');
                } catch (e) {
                    showToast('复制失败', 'error');
                }
            });
        });

        function showToast(message, type) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1e293b;color:white;padding:12px 20px;border-radius:8px;font-size:14px;z-index:2000;transition:opacity 0.3s;';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        // 添加标题锚点
        document.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(heading => {
            if (heading.id) {
                const anchor = document.createElement('a');
                anchor.href = '#' + heading.id;
                anchor.textContent = '#';
                anchor.style.cssText = 'margin-left: 8px; color: var(--md-link); text-decoration: none; opacity: 0;';
                heading.appendChild(anchor);
                heading.addEventListener('mouseenter', () => anchor.style.opacity = '1');
                heading.addEventListener('mouseleave', () => anchor.style.opacity = '0');
            }
        });
    </script>
</body>
</html>
